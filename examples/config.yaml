secretStore:
  address: "http://localhost:8200"
  authMethod: "token"
  token: "dev-root-token"
  # namespace: ""  # Optional: OpenBao namespace (global default for all secrets)

# Each secret defines:
# 1. key - Path to the secret in Vault
# 2. mountPath - KV secrets engine mount path
# 3. kvVersion - KV engine version (v1 or v2)
# 4. namespace - Optional: OpenBao namespace (overrides global namespace)
# 5. template.data - Map of keys to template expressions
# 6. files - List of output files
# Template mapping (external-secrets style):
#   - Template data key MUST match the basename of the target file path
#   - Key 'db-username' requires a file with basename 'db-username'
#   - Mismatched keys will cause an error

secrets:
  - name: "tls-cert"
    key: "common/tls/example-cert"
    mountPath: "secret"
    kvVersion: "v2"
    refreshInterval: "30m"
    template:
      data:
        tls.crt: '{{ .tlsCrt }}'    # -> .work/secrets/tls.crt
        tls.key: '{{ .tlsKey }}'    # -> .work/secrets/tls.key
    files:
      - path: ".work/secrets/tls.crt"
        mode: "0644"
      - path: ".work/secrets/tls.key"
        mode: "0600"

  - name: "database-creds"
    key: "database/prod/credentials"
    mountPath: "secret"
    kvVersion: "v2"
    refreshInterval: "5m"
    template:
      data:
        db-username: '{{ .username }}'  # -> .work/secrets/db-username
        db-password: '{{ .password }}'  # -> .work/secrets/db-password
    files:
      - path: ".work/secrets/db-username"
        mode: "0600"
      - path: ".work/secrets/db-password"
        mode: "0600"

  - name: "api-keys"
    key: "app/config"
    mountPath: "secret"
    kvVersion: "v2"
    refreshInterval: "1h"
    template:
      data:
        api-key: '{{ .apiKey }}'       # -> .work/secrets/api-key
        api-secret: '{{ .apiSecret }}' # -> .work/secrets/api-secret
    files:
      - path: ".work/secrets/api-key"
        mode: "0600"
      - path: ".work/secrets/api-secret"
        mode: "0600"
