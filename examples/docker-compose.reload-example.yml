version: '3.8'

# Example: Nginx with secrets-sync and reload-sidecar
# This demonstrates automatic Nginx reload when secrets change

services:
  # Main application (Nginx)
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - secrets:/etc/nginx/conf.d:ro
      - ./examples/nginx-default.conf:/etc/nginx/conf.d/default.conf.template:ro
    # Share PID namespace with reload-sidecar
    pid: "service:reload-sidecar"
    depends_on:
      - secrets-sync
      - reload-sidecar
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Reload sidecar - watches secrets and reloads Nginx
  reload-sidecar:
    image: secrets-sync:reload
    build:
      context: reload-sidecar
      dockerfile: Dockerfile
    volumes:
      - secrets:/secrets:ro
    environment:
      WATCH_PATH: /secrets
      PROCESS_NAME: nginx
      SIGNAL: HUP
      DEBOUNCE_SECONDS: 2
      LOG_TIMESTAMP: "true"
    # This container owns the PID namespace
    restart: unless-stopped

  # Secrets sync - syncs secrets from Vault
  secrets-sync:
    image: secrets-sync:latest
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - secrets:/secrets
      - ./examples/config-reload-example.yaml:/config.yaml:ro
    environment:
      VAULT_ADDR: ${VAULT_ADDR:-http://vault:8200}
      VAULT_TOKEN: ${VAULT_TOKEN:-dev-root-token}
      CONFIG_FILE: /config.yaml
    depends_on:
      - vault
    restart: unless-stopped

  # Vault (for testing)
  vault:
    image: hashicorp/vault:1.21
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  secrets:

networks:
  default:
    name: secrets-sync-network
